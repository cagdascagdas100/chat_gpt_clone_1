calculation_version: future_growth_v1
horizon_years_default: 5
disclaimer_text: "Kesin fiyat tahmini değildir"
output_positioning: decision_support_not_price_prediction

score_scale:
  min: 0
  max: 100
  rounding: 1_decimal
  clamp_final_score: true

weights:
  planning_growth_score: 0.30
  transport_infra_score: 0.20
  market_momentum_score: 0.15
  demographic_demand_score: 0.15
  social_amenity_score: 0.10
  land_supply_and_policy_score: 0.10

formula:
  weighted_sum: planning_growth_score * 0.30 + transport_infra_score * 0.20 + market_momentum_score * 0.15 + demographic_demand_score * 0.15 + social_amenity_score * 0.10 + land_supply_and_policy_score * 0.10
  risk_penalty_total: sum(active_risk_penalties)
  future_growth_score: clamp(weighted_sum - risk_penalty_total, 0, 100)
  future_growth_percent_label: derived_display_label_only
  normalize_to_0_100: true
  not_a_price_forecast: true

factor_score_caps:
  no_source_url:
    max_factor_score: 45
    max_confidence: medium
    allow_high_confidence: false
  fixture_mode:
    max_factor_score: 70
    max_confidence: medium
    allow_high_confidence: false
  stub_mode:
    max_factor_score: 55
    max_confidence: low_medium
    allow_high_confidence: false
  area_level_only:
    max_factor_score: 62
    max_confidence: low_medium
    allow_popup_evidence: false
  no_parcel_specific_evidence:
    max_factor_score: 50
    max_confidence: low
    popup_message: No parcel-specific evidence available

risk_penalty_rules:
  flood_zone_3:
    active_when: parcel_intersects_or_within_risk_polygon
    penalty_points: 12
    confidence_cap: medium
  conservation_area:
    active_when: parcel_intersects_conservation_area
    penalty_points: 8
    confidence_cap: medium_high
  listed_building:
    active_when: listed_building_point_or_site_matches_parcel
    penalty_points: 10
    confidence_cap: medium
  protected_landscape:
    active_when: protected_landscape_area_matches_parcel
    penalty_points: 7
    confidence_cap: medium
  weak_transactions:
    active_when: market_transaction_count_below_threshold
    penalty_points: 6
    confidence_cap: medium
    minimum_transaction_count: 5
  stale_or_conflicting_data:
    active_when: latest_evidence_is_stale_or_sources_conflict
    penalty_points: 6
    confidence_cap: low_medium
  missing_source_url:
    active_when: any_factor_attempts_high_confidence_without_source_url
    penalty_points: 0
    confidence_cap: medium
    force_no_high_confidence: true

confidence_rules:
  score_scale:
    min: 0
    max: 100
    high_threshold: 85
    medium_high_threshold: 72
    medium_threshold: 58
    low_medium_threshold: 42
    low_threshold: 0
  components:
    source_reliability_weight: 0.30
    recency_weight: 0.20
    geometry_precision_weight: 0.16
    relation_strength_weight: 0.14
    parcel_match_quality_weight: 0.12
    independent_source_bonus_weight: 0.08
  caps:
    source_url_missing: medium
    no_parcel_specific_evidence: low
    fixture_mode: medium
    stub_mode: low_medium
    relation_same_lsoa: low_medium
    relation_same_msoa: low
    relation_same_local_authority: low
    relation_city_level_only: low
    conflicting_sources: low_medium
    stale_data: low_medium
  hard_blocks:
    high_confidence_requires_source_url: true
    high_confidence_requires_parcel_specific_evidence: true
    high_confidence_requires_non_stub_mode: true
    high_confidence_requires_non_fixture_mode: true
    high_confidence_requires_no_major_contradiction: true

color_classes:
  strong_growth:
    min_score: 75
    max_score: 100
    label: strong_growth
  moderate_growth:
    min_score: 60
    max_score: 74.9
    label: moderate_growth
  limited_growth:
    min_score: 45
    max_score: 59.9
    label: limited_growth
  constrained_or_uncertain:
    min_score: 0
    max_score: 44.9
    label: constrained_or_uncertain

demo_output:
  weighted_sum: 60.35
  risk_penalty_total: 8
  future_growth_score: 52.35
  future_growth_percent_display: 52.4
  color_class: limited_growth
  confidence_score: 63
  confidence_label: medium
  note: LA-level and fixture evidence present; high confidence not allowed. Kesin fiyat tahmini değildir.

source_guard_examples:
  source_url_missing_attempt:
    attempted_confidence: high
    final_confidence: medium
    reason: source_url olmayan kayıt high confidence olamaz
  no_parcel_specific_evidence_attempt:
    attempted_confidence: medium_high
    final_confidence: low
    popup_message: No parcel-specific evidence available
