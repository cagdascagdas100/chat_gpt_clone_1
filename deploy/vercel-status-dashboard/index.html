<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AAYS ChatGPT Status</title><style>body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f6f7fb;color:#111827}.wrap{max-width:1400px;margin:auto;padding:16px}h1{font-size:22px;margin:0 0 8px}.sub,.small{color:#6b7280;font-size:12px}.card{background:white;border:1px solid #e5e7eb;border-radius:14px;padding:12px;margin:12px 0}.bar{display:flex;gap:8px;flex-wrap:wrap}button,input,textarea{border:1px solid #d1d5db;border-radius:9px;padding:8px;background:white}button{font-weight:700;cursor:pointer}textarea{width:100%;height:110px;margin-top:10px}.tablewrap{overflow:auto;background:white;border:1px solid #e5e7eb;border-radius:14px}table{width:100%;min-width:950px;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:13px;vertical-align:top}th{background:#111827;color:white}.ok{color:#047857;font-weight:800}.warn{color:#b45309;font-weight:800}.bad{color:#b91c1c;font-weight:800}.ago,.pct{font-weight:800}.mono{font-family:ui-monospace,Consolas,monospace}pre{white-space:pre-wrap;background:#111827;color:white;padding:10px;border-radius:10px;overflow:auto;max-height:320px}@media(max-width:700px){.wrap{padding:10px}.bar>*{width:100%}th,td{font-size:12px;padding:8px}}</style></head><body><div class="wrap"><h1>AAYS / TerraYield ChatGPT Durum Panosu</h1><div class="sub">Vercel uyumlu tek sayfa. “Kaç dk önce” sayacı refresh atmadan çalışır; JSON dakikada bir yenilenir.</div><div class="card"><div class="bar"><button onclick="loadRaw()">GitHub JSON yenile</button><button onclick="render(EMBEDDED)">Gömülü snapshot</button><button onclick="copyRawUrl()">Raw JSON linki</button><input type="file" id="file" accept=".json,application/json"><button onclick="loadPasted()">JSON yapıştır</button></div><p id="info" class="small"></p><textarea id="paste" placeholder="multi_page_status.json içeriğini buraya yapıştır"></textarea></div><div class="tablewrap"><table><thead><tr><th>Sayfa</th><th>Aktif görev</th><th>Durum</th><th>Genel %</th><th>Bekleme</th><th>Son mesaj</th><th>Kaç dk önce</th><th>Komut</th><th>Blokaj / Not</th></tr></thead><tbody id="rows"></tbody></table></div><div class="card"><b>Ham JSON</b><pre id="raw"></pre></div></div><script>const RAW_URL='https://raw.githubusercontent.com/cagdascagdas100/chat_gpt_clone_1/main/docs/chatgpt_status/multi_page_status.json';const EMBEDDED={_meta:{schema_version:2,updated_at:'2026-05-20 22:10:00'},pages:{'1.3 Ready to Sell':{active_task:'terrayield-cost-engine-055-integration-fix-plan-20260520',status:'running',overall_progress:76,wait_minutes:'30-35',next_command:'devam et',blocker:'Cost Engine 054 completed with 14 failed matrix cases; 055 integration/fix plan queued.',last_message_text:'devam',last_message_at:'2026-05-20 22:10:00',db_write:false,production_deploy:false,updated_at:'2026-05-20 22:10:00'}}};function esc(v){return String(v??'').replace(/[&<>]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[s]))}function cls(s){s=String(s||'').toLowerCase();if(s.includes('fail')||s.includes('block')||s.includes('error'))return'bad';if(s.includes('run')||s.includes('poll')||s.includes('wait')||s.includes('queue'))return'warn';return'ok'}function parseTime(v){if(!v)return null;let d=new Date(String(v).trim().replace(' ','T'));if(isNaN(d))d=new Date(String(v));return isNaN(d)?null:d}function agoText(v){let d=parseTime(v);if(!d)return'';let sec=Math.max(0,Math.floor((Date.now()-d.getTime())/1000)),min=Math.floor(sec/60);if(min<1)return sec+' sn önce';if(min<60)return min+' dk önce';let h=Math.floor(min/60),m=min%60;if(h<24)return h+' sa '+m+' dk önce';return Math.floor(h/24)+' gün '+(h%24)+' sa önce'}function updateAgo(){document.querySelectorAll('[data-last]').forEach(el=>el.textContent=agoText(el.getAttribute('data-last')))}function render(data){localStorage.setItem('aays_status_last_json',JSON.stringify(data));raw.textContent=JSON.stringify(data,null,2);info.textContent='Yüklendi: '+new Date().toLocaleString()+' | status updated_at: '+((data._meta||{}).updated_at||'');rows.innerHTML='';Object.keys(data.pages||{}).sort().forEach(k=>{let p=data.pages[k]||{},last=p.last_message_at||p.updated_at||'',tr=document.createElement('tr');tr.innerHTML='<td><b>'+esc(k)+'</b></td><td class="mono">'+esc(p.active_task)+'</td><td class="'+cls(p.status)+'">'+esc(p.status)+'</td><td class="pct">'+esc(p.overall_progress)+'</td><td>'+esc(p.wait_minutes)+'</td><td>'+esc(p.last_message_text||'')+'<br><span class="small">'+esc(last)+'</span></td><td class="ago" data-last="'+esc(last)+'"></td><td>'+esc(p.next_command)+'</td><td>'+esc(p.blocker||p.note||'')+'</td>';rows.appendChild(tr)});updateAgo()}async function loadRaw(){try{let r=await fetch(RAW_URL+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);render(await r.json())}catch(e){let c=localStorage.getItem('aays_status_last_json');if(c){render(JSON.parse(c));info.textContent='Raw JSON yüklenemedi; cache gösteriliyor: '+e.message}else info.textContent='Raw JSON yüklenemedi: '+e.message}}function loadPasted(){try{render(JSON.parse(paste.value))}catch(e){alert('JSON okunamadı: '+e.message)}}function copyRawUrl(){navigator.clipboard?.writeText(RAW_URL).then(()=>info.textContent='Raw JSON linki kopyalandı.',()=>info.textContent=RAW_URL)|| (info.textContent=RAW_URL)}file.onchange=e=>{let f=e.target.files[0];if(!f)return;let rd=new FileReader();rd.onload=()=>render(JSON.parse(rd.result));rd.readAsText(f)};render(EMBEDDED);setInterval(updateAgo,1000);setInterval(loadRaw,60000);loadRaw();</script></body></html>
