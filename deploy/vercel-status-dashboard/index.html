<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AAYS Status</title><style>body{font-family:Arial,sans-serif;margin:0;background:#f6f7fb;color:#111827}.wrap{max-width:1400px;margin:auto;padding:16px}h1{font-size:22px;margin:0 0 8px}.sub{color:#6b7280;font-size:12px;margin-bottom:12px}.tablewrap{overflow:auto;background:white;border:1px solid #e5e7eb;border-radius:14px}table{width:100%;min-width:950px;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:13px;vertical-align:top}th{background:#111827;color:white}.ok{color:#047857;font-weight:800}.warn{color:#b45309;font-weight:800}.bad{color:#b91c1c;font-weight:800}.ago,.pct{font-weight:800}.mono{font-family:Consolas,monospace}.info{color:#6b7280;font-size:12px;margin:8px 0 14px}@media(max-width:700px){.wrap{padding:10px}h1{font-size:18px}th,td{font-size:12px;padding:8px}}</style></head><body><div class="wrap"><h1>AAYS / TerraYield ChatGPT Durum Panosu</h1><div class="sub">Sadece canlı tablo. Kaç dk önce sayacı sayfa yenilemeden çalışır.</div><div id="info" class="info">Yükleniyor...</div><div class="tablewrap"><table><thead><tr><th>Sayfa</th><th>Aktif görev</th><th>Durum</th><th>Genel %</th><th>Bekleme</th><th>Son mesaj</th><th>Kaç dk önce</th><th>Komut</th><th>Blokaj / Not</th></tr></thead><tbody id="rows"></tbody></table></div></div><script>const U='https://raw.githubusercontent.com/cagdascagdas100/chat_gpt_clone_1/main/docs/chatgpt_status/multi_page_status.json';const E={_meta:{updated_at:'2026-05-20 22:10:00'},pages:{'1.3 Ready to Sell':{active_task:'terrayield-cost-engine-055-integration-fix-plan-20260520',status:'running',overall_progress:76,wait_minutes:'30-35',next_command:'devam et',blocker:'055 integration/fix plan queued.',last_message_text:'devam',last_message_at:'2026-05-20 22:10:00',updated_at:'2026-05-20 22:10:00'}}};function esc(v){return String(v??'').replace(/[&<>]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[s]))}function c(s){s=String(s||'').toLowerCase();if(s.includes('fail')||s.includes('block'))return'bad';if(s.includes('run')||s.includes('wait')||s.includes('queue'))return'warn';return'ok'}function dt(v){let d=new Date(String(v||'').replace(' ','T'));return isNaN(d)?null:d}function ago(v){let d=dt(v);if(!d)return'';let m=Math.floor(Math.max(0,Date.now()-d.getTime())/60000);if(m<1)return'az önce';if(m<60)return m+' dk önce';let h=Math.floor(m/60);return h+' sa '+m%60+' dk önce'}function tick(){document.querySelectorAll('[data-t]').forEach(x=>x.textContent=ago(x.dataset.t))}function draw(j,src){info.textContent='Yüklendi: '+new Date().toLocaleString()+' | kaynak: '+src+' | status: '+((j._meta||{}).updated_at||'');rows.innerHTML='';Object.keys(j.pages||{}).sort().forEach(k=>{let p=j.pages[k],t=p.last_message_at||p.updated_at||'',r=document.createElement('tr');r.innerHTML='<td><b>'+esc(k)+'</b></td><td class="mono">'+esc(p.active_task)+'</td><td class="'+c(p.status)+'">'+esc(p.status)+'</td><td class="pct">'+esc(p.overall_progress)+'</td><td>'+esc(p.wait_minutes)+'</td><td>'+esc(p.last_message_text||'')+'<br><span class="info">'+esc(t)+'</span></td><td class="ago" data-t="'+esc(t)+'"></td><td>'+esc(p.next_command)+'</td><td>'+esc(p.blocker||'')+'</td>';rows.appendChild(r)});tick()}async function load(){try{let r=await fetch(U+'?t='+Date.now(),{cache:'no-store'});draw(await r.json(),'GitHub')}catch(e){draw(E,'gömülü')}}draw(E,'gömülü');load();setInterval(load,60000);setInterval(tick,1000);</script></body></html>
