<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AAYS ChatGPT Status Dashboard</title><style>body{font-family:Arial,sans-serif;margin:18px;background:#f6f7fb;color:#111827}h1{font-size:22px;margin:0 0 8px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin:12px 0;box-shadow:0 1px 4px #0001}.bar{display:flex;gap:8px;flex-wrap:wrap}button,input,textarea{border:1px solid #d1d5db;border-radius:8px;padding:8px;background:#fff}button{cursor:pointer;font-weight:600}table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden}th,td{padding:9px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:13px}th{background:#111827;color:#fff}.ok{color:#047857;font-weight:700}.warn{color:#b45309;font-weight:700}.bad{color:#b91c1c;font-weight:700}.small{font-size:12px;color:#6b7280}textarea{width:100%;height:130px}pre{white-space:pre-wrap;background:#111827;color:#f9fafb;padding:10px;border-radius:10px;overflow:auto}</style></head><body><h1>AAYS / TerraYield ChatGPT Status</h1><div class="small">Tek dosyalık pano. İnternet olmasa bile gömülü snapshot açılır. JSON dosyası seçebilir veya JSON yapıştırabilirsin.</div><div class="card"><div class="bar"><button onclick="render(EMBEDDED)">Gömülü snapshot</button><button onclick="loadRaw()">GitHub raw yenile</button><input type="file" id="file" accept=".json"><button onclick="loadPasted()">Aşağıdaki JSON'u yükle</button></div><p id="info" class="small"></p><textarea id="paste" placeholder="multi_page_status.json içeriğini buraya yapıştırabilirsin"></textarea></div><table><thead><tr><th>Sayfa</th><th>Aktif görev</th><th>Durum</th><th>Teknik %</th><th>Genel %</th><th>Bekleme</th><th>Komut</th><th>Blokaj / Not</th><th>Güncelleme</th></tr></thead><tbody id="rows"></tbody></table><div class="card"><b>Ham JSON</b><pre id="raw"></pre></div><script>const RAW_URL='https://raw.githubusercontent.com/cagdascagdas100/chat_gpt_clone_1/main/docs/chatgpt_status/multi_page_status.json';const EMBEDDED={"_meta":{"schema_version":1,"purpose":"Shared live status file for multiple ChatGPT pages controlling AAYS/TerraYield tasks.","status_dashboard":"docs/chatgpt_status/index.html","standalone_dashboard":"docs/chatgpt_status/status_dashboard_standalone.html","markdown_summary":"docs/chatgpt_status/status.md","update_helper":"ai-task-scripts/update_chatgpt_status.ps1","updated_at":"2026-05-20 21:40:45"},"pages":{"1.3 Ready to Sell":{"active_task":"terrayield-cost-engine-054-test-matrix-20260520","status":"finished_with_failures","technical_progress":100,"overall_progress":75,"wait_minutes":"5-10","next_command":"devam et","runner_status":"finished","runner_message":"exit=0","blocker":"Cost Engine 054 completed with 14 failed matrix cases; next task is cost-engine-055 integration/fix plan.","db_write":false,"production_deploy":false,"updated_at":"2026-05-20 21:40:45"}}};function esc(v){return String(v??'').replace(/[&<>]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[s]))}function cls(s){s=String(s||'').toLowerCase();if(s.includes('fail')||s.includes('block'))return'bad';if(s.includes('run')||s.includes('poll')||s.includes('wait'))return'warn';return'ok'}function render(data){document.getElementById('raw').textContent=JSON.stringify(data,null,2);let meta=data._meta||{};document.getElementById('info').textContent='Yüklendi: '+new Date().toLocaleString()+' | status updated_at: '+(meta.updated_at||'');let rows=document.getElementById('rows');rows.innerHTML='';let pages=data.pages||{};Object.keys(pages).sort().forEach(k=>{let p=pages[k]||{},tr=document.createElement('tr');tr.innerHTML='<td><b>'+esc(k)+'</b></td><td>'+esc(p.active_task)+'</td><td class="'+cls(p.status)+'">'+esc(p.status)+'</td><td>'+esc(p.technical_progress)+'</td><td>'+esc(p.overall_progress)+'</td><td>'+esc(p.wait_minutes)+'</td><td>'+esc(p.next_command)+'</td><td>'+esc(p.blocker||p.note||'')+'</td><td class="small">'+esc(p.updated_at)+'</td>';rows.appendChild(tr)})}async function loadRaw(){try{let r=await fetch(RAW_URL+'?ts='+Date.now(),{cache:'no-store'});render(await r.json())}catch(e){document.getElementById('info').textContent='Raw JSON yüklenemedi. Dosya seç veya JSON yapıştır: '+e.message}}function loadPasted(){try{render(JSON.parse(document.getElementById('paste').value))}catch(e){alert('JSON okunamadı: '+e.message)}}document.getElementById('file').onchange=e=>{let f=e.target.files[0];if(!f)return;let rd=new FileReader();rd.onload=()=>render(JSON.parse(rd.result));rd.readAsText(f)};render(EMBEDDED);</script></body></html>
