<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AAYS ChatGPT Status Dashboard</title><style>body{font-family:Arial,sans-serif;margin:18px;background:#f6f7fb;color:#111827}h1{font-size:22px;margin:0 0 8px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin:12px 0;box-shadow:0 1px 4px #0001}.bar{display:flex;gap:8px;flex-wrap:wrap}button,input,textarea{border:1px solid #d1d5db;border-radius:8px;padding:8px;background:#fff}button{cursor:pointer;font-weight:600}table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden}th,td{padding:9px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:13px}th{background:#111827;color:#fff}.ok{color:#047857;font-weight:700}.warn{color:#b45309;font-weight:700}.bad{color:#b91c1c;font-weight:700}.small{font-size:12px;color:#6b7280}.ago{font-weight:700}textarea{width:100%;height:110px}pre{white-space:pre-wrap;background:#111827;color:#f9fafb;padding:10px;border-radius:10px;overflow:auto}</style></head><body><h1>AAYS / TerraYield ChatGPT Status</h1><div class="small">Canlı pano: tablo refresh atmadan “kaç dk önce” değerini sayar. JSON otomatik yenileme dener; olmazsa dosya seç veya JSON yapıştır.</div><div class="card"><div class="bar"><button onclick="render(EMBEDDED)">Gömülü snapshot</button><button onclick="loadRaw()">GitHub raw yenile</button><input type="file" id="file" accept=".json"><button onclick="loadPasted()">JSON'u yükle</button></div><p id="info" class="small"></p><textarea id="paste" placeholder="multi_page_status.json içeriğini buraya yapıştırabilirsin"></textarea></div><table><thead><tr><th>Sayfa</th><th>Aktif görev</th><th>Durum</th><th>Genel %</th><th>Bekleme</th><th>Son mesaj</th><th>Kaç dk önce</th><th>Komut</th><th>Blokaj / Not</th></tr></thead><tbody id="rows"></tbody></table><div class="card"><b>Ham JSON</b><pre id="raw"></pre></div><script>const RAW_URL='https://raw.githubusercontent.com/cagdascagdas100/chat_gpt_clone_1/main/docs/chatgpt_status/multi_page_status.json';let CURRENT=null;const EMBEDDED={"_meta":{"schema_version":2,"purpose":"Shared live status file for multiple ChatGPT pages controlling AAYS/TerraYield tasks.","status_dashboard":"docs/chatgpt_status/index.html","standalone_dashboard":"docs/chatgpt_status/status_dashboard_standalone.html","markdown_summary":"docs/chatgpt_status/status.md","update_helper":"ai-task-scripts/update_chatgpt_status.ps1","updated_at":"2026-05-20 21:40:45"},"pages":{"1.3 Ready to Sell":{"active_task":"terrayield-cost-engine-055-integration-fix-plan-20260520","status":"running","technical_progress":75,"overall_progress":76,"wait_minutes":"30-35","next_command":"devam et","runner_status":"queued","runner_message":"055 fix plan queued","blocker":"Cost Engine 054 completed with 14 failed matrix cases; 055 integration/fix plan queued.","last_message_text":"devam","last_message_at":"2026-05-20 22:10:00","db_write":false,"production_deploy":false,"updated_at":"2026-05-20 22:10:00"}}};function esc(v){return String(v??'').replace(/[&<>]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[s]))}function cls(s){s=String(s||'').toLowerCase();if(s.includes('fail')||s.includes('block'))return'bad';if(s.includes('run')||s.includes('poll')||s.includes('wait')||s.includes('queue'))return'warn';return'ok'}function parseTime(v){if(!v)return null;let s=String(v).trim().replace(' ','T');let d=new Date(s);if(isNaN(d.getTime()))d=new Date(String(v));return isNaN(d.getTime())?null:d}function agoText(v){let d=parseTime(v);if(!d)return'';let sec=Math.max(0,Math.floor((Date.now()-d.getTime())/1000));let min=Math.floor(sec/60);if(min<1)return sec+' sn önce';if(min<60)return min+' dk önce';let h=Math.floor(min/60),m=min%60;return h+' sa '+m+' dk önce'}function updateAgo(){document.querySelectorAll('[data-last]').forEach(el=>{el.textContent=agoText(el.getAttribute('data-last'))})}function render(data){CURRENT=data;document.getElementById('raw').textContent=JSON.stringify(data,null,2);let meta=data._meta||{};document.getElementById('info').textContent='Yüklendi: '+new Date().toLocaleString()+' | status updated_at: '+(meta.updated_at||'');let rows=document.getElementById('rows');rows.innerHTML='';let pages=data.pages||{};Object.keys(pages).sort().forEach(k=>{let p=pages[k]||{},tr=document.createElement('tr');let last=p.last_message_at||p.updated_at||'';tr.innerHTML='<td><b>'+esc(k)+'</b></td><td>'+esc(p.active_task)+'</td><td class="'+cls(p.status)+'">'+esc(p.status)+'</td><td><b>'+esc(p.overall_progress)+'</b></td><td>'+esc(p.wait_minutes)+'</td><td>'+esc(p.last_message_text||'')+'<br><span class="small">'+esc(last)+'</span></td><td class="ago" data-last="'+esc(last)+'"></td><td>'+esc(p.next_command)+'</td><td>'+esc(p.blocker||p.note||'')+'</td>';rows.appendChild(tr)});updateAgo()}async function loadRaw(){try{let r=await fetch(RAW_URL+'?ts='+Date.now(),{cache:'no-store'});render(await r.json())}catch(e){document.getElementById('info').textContent='Raw JSON yüklenemedi. Dosya seç veya JSON yapıştır: '+e.message}}function loadPasted(){try{render(JSON.parse(document.getElementById('paste').value))}catch(e){alert('JSON okunamadı: '+e.message)}}document.getElementById('file').onchange=e=>{let f=e.target.files[0];if(!f)return;let rd=new FileReader();rd.onload=()=>render(JSON.parse(rd.result));rd.readAsText(f)};render(EMBEDDED);setInterval(updateAgo,1000);setInterval(loadRaw,60000);</script></body></html>
