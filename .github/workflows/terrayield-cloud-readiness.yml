name: TerraYield Cloud Readiness

on:
  workflow_dispatch:
  push:
    branches:
      - security-accuracy-expansion-20260508
    paths:
      - 'terrayield_land_intelligence/Dockerfile.cloud'
      - 'terrayield_land_intelligence/render.example.yaml'
      - 'terrayield_land_intelligence/.env.cloud.example'
      - 'terrayield_land_intelligence/scripts/cloud_smoke_check.py'
      - 'terrayield_land_intelligence/scripts/validate_cloud_readiness_static.py'
      - 'terrayield_land_intelligence/scripts/validate_watchdog_readiness.py'
      - 'terrayield_land_intelligence/docs/cloud_ready/**'
      - 'terrayield_land_intelligence/docs/chatgpt_handoff/cloud_ready_20260517/**'
      - '.github/workflows/terrayield-cloud-readiness.yml'

jobs:
  cloud-readiness-static:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required cloud scaffold files
        run: |
          set -euo pipefail
          test -f terrayield_land_intelligence/Dockerfile.cloud
          test -f terrayield_land_intelligence/render.example.yaml
          test -f terrayield_land_intelligence/.env.cloud.example
          test -f terrayield_land_intelligence/scripts/cloud_smoke_check.py
          test -f terrayield_land_intelligence/scripts/validate_cloud_readiness_static.py
          test -f terrayield_land_intelligence/scripts/validate_watchdog_readiness.py

      - name: Verify cloud-ready status package
        run: |
          set -euo pipefail
          test -f terrayield_land_intelligence/docs/cloud_ready/CURRENT_STATUS_20260517.md
          test -f terrayield_land_intelligence/docs/cloud_ready/CURRENT_STATUS_MACHINE_20260518.json
          test -f terrayield_land_intelligence/docs/cloud_ready/INDEX_TR.md
          test -f terrayield_land_intelligence/docs/cloud_ready/FINAL_MANIFEST_20260517.json
          test -f terrayield_land_intelligence/docs/cloud_ready/NEXT_OPERATOR_HANDOFF_20260518.md
          test -f terrayield_land_intelligence/docs/cloud_ready/GITHUB_ONLY_AUTONOMOUS_CLOSURE_CHECKLIST_20260518.md
          test -f terrayield_land_intelligence/docs/cloud_ready/AUTONOMOUS_LONG_RUN_POLICY_20260518.md
          test -f terrayield_land_intelligence/docs/cloud_ready/AUTONOMOUS_GITHUB_BACKLOG_20260518.md

      - name: Verify provider and runtime proof package
        run: |
          set -euo pipefail
          test -f terrayield_land_intelligence/docs/cloud_ready/PROVIDER_DECISION_PACKAGE_20260518.md
          test -f terrayield_land_intelligence/docs/cloud_ready/FAST_PATH_DEPLOY_PLAYBOOK_TR_20260518.md
          test -f terrayield_land_intelligence/docs/cloud_ready/PROVIDER_ENV_CHECKLIST_TR_20260518.md
          test -f terrayield_land_intelligence/docs/cloud_ready/RUNTIME_PROOF_GAP_REGISTER_20260518.md
          test -f terrayield_land_intelligence/docs/cloud_ready/HOSTED_SMOKE_RESULT_TEMPLATE_20260518.txt

      - name: Verify watchdog package
        run: |
          set -euo pipefail
          test -f terrayield_land_intelligence/docs/chatgpt_handoff/local_runner_queue/AAYS_LOCAL_RUNNER_WATCHDOG_SAFE.ps1
          test -f terrayield_land_intelligence/docs/chatgpt_handoff/local_runner_queue/START_WATCHDOG_SAFE_ONCE.ps1
          test -f terrayield_land_intelligence/docs/cloud_ready/SAFE_RUNNER_TASK_PROTOCOL_20260518.md
          test -f terrayield_land_intelligence/docs/cloud_ready/PERSISTENT_RUNNER_WATCHDOG_DESIGN_20260518.md
          test -f terrayield_land_intelligence/docs/cloud_ready/WATCHDOG_RUNNER_USAGE_TR_20260518.md
          test -f terrayield_land_intelligence/docs/cloud_ready/WATCHDOG_EVIDENCE_TEMPLATE_20260518.txt
          test -f terrayield_land_intelligence/docs/cloud_ready/WATCHDOG_READINESS_CLOSURE_20260518.md

      - name: Run static readiness validators
        run: |
          set -euo pipefail
          python terrayield_land_intelligence/scripts/validate_cloud_readiness_static.py
          python terrayield_land_intelligence/scripts/validate_watchdog_readiness.py

      - name: Verify expected pending-provider classification
        run: |
          set -euo pipefail
          grep -q 'CLOUD_READY_PENDING_PROVIDER' terrayield_land_intelligence/docs/cloud_ready/CURRENT_STATUS_20260517.md
          grep -q 'WAIT_FOR_USER_PROVIDER_DECISION' terrayield_land_intelligence/docs/cloud_ready/CURRENT_STATUS_20260517.md
          grep -q '"classification": "CLOUD_READY_PENDING_PROVIDER"' terrayield_land_intelligence/docs/cloud_ready/CURRENT_STATUS_MACHINE_20260518.json
          grep -q '"next_single_action": "WAIT_FOR_USER_PROVIDER_DECISION"' terrayield_land_intelligence/docs/cloud_ready/CURRENT_STATUS_MACHINE_20260518.json

      - name: Verify safety markers
        run: |
          set -euo pipefail
          grep -q 'db_write=none' terrayield_land_intelligence/docs/cloud_ready/CURRENT_STATUS_20260517.md
          grep -q 'ddl=none' terrayield_land_intelligence/docs/cloud_ready/CURRENT_STATUS_20260517.md
          grep -q 'migration_apply=none' terrayield_land_intelligence/docs/cloud_ready/CURRENT_STATUS_20260517.md
          grep -q 'prod_deploy=none' terrayield_land_intelligence/docs/cloud_ready/CURRENT_STATUS_20260517.md
          grep -q 'secret_values_printed=false' terrayield_land_intelligence/docs/cloud_ready/CURRENT_STATUS_20260517.md

      - name: Verify hosted smoke script blocks without public URL
        run: |
          set +e
          unset TERRAYIELD_PUBLIC_API_URL
          python terrayield_land_intelligence/scripts/cloud_smoke_check.py > /tmp/cloud_smoke_no_url.json
          code=$?
          cat /tmp/cloud_smoke_no_url.json
          test "$code" -eq 2
          grep -q 'TERRAYIELD_PUBLIC_API_URL missing' /tmp/cloud_smoke_no_url.json
